services:
  # Your Express app
  app:
    build: . # Build using the Dockerfile in this directory
    ports:
      - "${PORT}:${PORT}" # host:container port mapping
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:${POSTGRES_PORT}/${POSTGRES_DB}
      - REDIS_URL=redis://redis:${REDIS_PORT}
    depends_on:
      - db # Wait for db to start first
      - redis

  # Postgres database (development)
  db:
    image: postgres:16 # Use official Postgres image
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data # Persist data between restarts

  # Redis cache and rate limiting store
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT}:6379" # host:container port mapping
    volumes:
      - redis_data:/data # Persist data between restarts

  # Postgres database (testing)
  db-test:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}_test
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}_test
      POSTGRES_DB: ${POSTGRES_DB}_test
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data

  # Redis for testing
  redis-test:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_test_data:/data

volumes:
  postgres_data: # Named volume so data survives container restarts
  postgres_test_data: # Named volume for test database
  redis_data: # Named volume for Redis data
  redis_test_data:
